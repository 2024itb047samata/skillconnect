kind = "web"
previewPath = "/"
title = "SkillConnect"
version = "1.0.0"
id = "artifacts/skillconnect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18779

[services.development]
run = "pnpm --filter @workspace/skillconnect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skillconnect", "run", "build" ]
publicDir = "artifacts/skillconnect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18779"
BASE_PATH = "/"
